name: Monthly source check

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run source check
        id: check
        run: node scripts/check-sources.mjs

      - name: Commit updated hashes
        run: |
          git config user.name "jiro-status-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/source-hashes.json data/last-check-summary.md
          git diff --cached --quiet || git commit -m "chore: monthly source hash check"
          git push

      - name: Open issue if a source changed or many fetches failed
        if: steps.check.outputs.changed != '0' || steps.check.outputs.failed >= '5'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('data/last-check-summary.md', 'utf8');
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `月次チェック: 出典ページ更新/取得失敗あり (${today})`,
              body,
            });

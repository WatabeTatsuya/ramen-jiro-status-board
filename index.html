<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ラーメン二郎 営業状況ボード</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#9c150a">

<style>
  :root{
    --paper: #fff6dc;
    --paper-deep: #ffe392;
    --ink: #2a1305;
    --ink-soft: #6b4a24;
    --jiro-red: #d81f11;
    --jiro-red-deep: #9c150a;
    --jiro-yellow: #ffc72c;
    --open-green: #3d6b46;
    --open-green-deep: #2a4a31;
    --closed-slate: #8a7350;
    --line: #f0cf6a;
    --card-bg: #fffdf3;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--paper);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(216,31,17,0.08) 1px, transparent 0);
    background-size: 14px 14px;
    color: var(--ink);
    font-family: "Hiragino Sans", "Yu Gothic", "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .page{ max-width: 1120px; margin: 0 auto; padding: 0 20px 64px; }

  .board-header{
    background: var(--jiro-red-deep);
    color: var(--paper);
    margin: 0 -20px 28px;
    padding: 36px 20px 28px;
    border-bottom: 6px solid var(--jiro-yellow);
  }
  .header-inner{ max-width: 1120px; margin: 0 auto; display: flex; align-items: center; gap: 28px; }
  .header-text{ flex: 1 1 auto; min-width: 0; }
  .header-photo{
    flex: none;
    width: 160px;
    height: 160px;
    border-radius: 10px;
    overflow: hidden;
    border: 4px solid var(--jiro-yellow);
    box-shadow: 0 6px 18px rgba(0,0,0,0.35);
  }
  .header-photo img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  @media (max-width: 640px){
    .header-photo{ display: none; }
  }
  .eyebrow{
    margin: 0 0 6px;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--jiro-yellow);
    font-weight: 700;
  }
  h1{
    margin: 0 0 18px;
    font-size: clamp(26px, 4vw, 38px);
    font-weight: 900;
    letter-spacing: 0.02em;
    text-wrap: balance;
  }
  .clock-row{
    display: flex;
    align-items: baseline;
    gap: 14px;
    flex-wrap: wrap;
    border-top: 1px solid rgba(255,255,255,0.28);
    padding-top: 14px;
  }
  .clock{
    font-family: "SFMono-Regular", Consolas, "Menlo", monospace;
    font-variant-numeric: tabular-nums;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.03em;
  }
  .clock-date{ font-size: 14px; color: #ffe9b0; }
  .disclaimer{
    margin: 14px 0 0;
    font-size: 12.5px;
    line-height: 1.6;
    color: #ffe9b0;
    max-width: 70ch;
  }

  .controls{
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  #search{
    flex: 1 1 260px;
    max-width: 360px;
    padding: 10px 14px;
    border: 1px solid var(--line);
    border-radius: 3px;
    background: var(--card-bg);
    font-size: 14px;
    color: var(--ink);
  }
  #search:focus{
    outline: 2px solid var(--jiro-red);
    outline-offset: 1px;
  }
  .summary{
    font-size: 13px;
    color: var(--ink-soft);
    font-variant-numeric: tabular-nums;
  }

  .tabs{
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .tab-btn{
    flex: 1 1 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.06em;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: var(--card-bg);
    color: var(--ink-soft);
    cursor: pointer;
  }
  .tab-btn .count{
    font-family: "SFMono-Regular", Consolas, monospace;
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    background: rgba(23,37,66,0.08);
    padding: 2px 9px;
    border-radius: 999px;
    font-size: 13px;
  }
  .tab-btn.active[data-tab="open"]{ background: var(--open-green-deep); border-color: var(--open-green-deep); color: var(--card-bg); }
  .tab-btn.active[data-tab="closed"]{ background: var(--closed-slate); border-color: var(--closed-slate); color: var(--card-bg); }
  .tab-btn.active .count{ background: rgba(0,0,0,0.18); color: inherit; }

  .board{
    display: block;
  }
  .board .column{ display: none; }
  .board .column.tab-visible{ display: block; }

  .column{
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-radius: 4px;
    overflow: hidden;
  }
  .count{
    font-family: "SFMono-Regular", Consolas, monospace;
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    background: rgba(0,0,0,0.18);
    padding: 2px 9px;
    border-radius: 999px;
    font-size: 13px;
  }

  .shop-list{
    list-style: none;
    margin: 0;
    padding: 6px;
    max-height: 68vh;
    overflow-y: auto;
  }
  .shop-card{
    padding: 12px 12px;
    border-bottom: 1px solid var(--line);
  }
  .shop-list li:last-child{ border-bottom: none; }
  .shop-card-inner{
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .card-content{ flex: 1 1 auto; min-width: 0; }
  .card-photo{
    flex: none;
    width: 92px;
    height: 92px;
    border-radius: 6px;
    overflow: hidden;
    border: 2px solid var(--jiro-red);
    background: var(--paper-deep);
  }
  .card-photo img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .photo-placeholder{
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
  }
  @media (max-width: 480px){
    .card-photo{ width: 72px; height: 72px; }
    .photo-placeholder{ font-size: 26px; }
  }
  .card-top{
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot{
    width: 8px; height: 8px;
    border-radius: 50%;
    flex: none;
  }
  .column-open .dot{ background: var(--open-green); box-shadow: 0 0 0 3px rgba(61,107,70,0.18); animation: pulse 2.2s ease-in-out infinite; }
  .column-closed .dot{ background: var(--closed-slate); }
  @media (prefers-reduced-motion: reduce){
    .column-open .dot{ animation: none; }
  }
  @keyframes pulse{
    0%,100%{ opacity: 1; }
    50%{ opacity: 0.4; }
  }
  .shop-name{
    margin: 0;
    font-size: 15px;
    font-weight: 800;
  }
  .shop-area{
    margin: 4px 0 0 16px;
    font-size: 12.5px;
    color: var(--ink-soft);
  }
  .shop-hours{
    margin: 6px 0 0 16px;
    font-size: 12.5px;
    line-height: 1.6;
    font-variant-numeric: tabular-nums;
  }
  .shop-closed{
    margin: 4px 0 0 16px;
    font-size: 12px;
    color: var(--ink-soft);
  }
  .card-links{
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin: 8px 0 0 16px;
  }
  .sns-toggle{
    font-family: inherit;
    font-size: 11.5px;
    font-weight: 700;
    color: var(--ink);
    background: var(--paper-deep);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 3px 11px;
    text-decoration: none;
    display: inline-block;
    cursor: pointer;
  }
  .sns-toggle:hover{ background: var(--line); }
  .sns-link{
    font-size: 11.5px;
    color: var(--jiro-red);
    text-decoration: none;
    border-bottom: 1px solid rgba(172,59,44,0.4);
  }
  .sns-none{
    font-size: 11px;
    color: var(--ink-soft);
    opacity: 0.75;
  }
  .map-toggle{
    font-family: inherit;
    font-size: 11.5px;
    font-weight: 700;
    color: var(--ink);
    background: var(--paper-deep);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 3px 11px;
    cursor: pointer;
  }
  .map-toggle:hover{ background: var(--line); }
  .map-embed{
    margin: 10px 0 0 16px;
    max-width: 360px;
  }
  .map-embed iframe{
    width: 100%;
    height: 220px;
    border: 1px solid var(--line);
    border-radius: 4px;
  }
  .empty-note{
    padding: 20px 16px;
    font-size: 13px;
    color: var(--ink-soft);
  }

  .unknown-section{
    margin-top: 20px;
    background: var(--card-bg);
    border: 1px dashed var(--line);
    border-radius: 4px;
    padding: 4px 12px 10px;
  }
  .unknown-section h3{
    font-size: 13px;
    color: var(--ink-soft);
    letter-spacing: 0.04em;
    margin: 10px 0 4px 4px;
  }
  .unknown-list{ padding: 0 4px; }
  .unknown-list .shop-card{ padding: 8px 8px; }

  .board-footer{
    margin-top: 26px;
    font-size: 11.5px;
    color: var(--ink-soft);
    text-align: center;
  }
</style>
</head>

    <p>営業時間・定休日は月次のバッチ更新をもとに反映しています。今後変更される場合があります。</p>
  </footer>
</div>

const PREFECTURES = Object.values(REGION_PREFS).flat();
const PREF_TO_REGION = {};
for(const [region, prefs] of Object.entries(REGION_PREFS)){
  for(const pref of prefs) PREF_TO_REGION[pref] = region;
}
function extractPrefecture(area){
  if(!area) return null;
  return PREFECTURES.find(p => area.startsWith(p)) || null;
}
function regionOf(area){
  const pref = extractPrefecture(area);
  return pref ? PREF_TO_REGION[pref] : null;
}

function timeToMinutes(t){
  if(!t) return null;
  const [h,m] = t.split(':').map(Number);
  return h*60+m;
}
function prevDow(d){
  const i = DOW_ORDER.indexOf(d);
  return DOW_ORDER[(i+6)%7];
}
function formatDays(days){
  return days.map(d=>DAY_LABEL[d]).join('・');
}
function formatEntry(h){
  const days = formatDays(h.days);
  let time;
  if(h.open && h.close){
    time = `${h.open}–${h.close}${h.closesNextDay ? '(翌)' : ''}`;
  } else if(h.open && !h.close){
    time = `${h.open}〜(閉店時間未定)`;
  } else {
    time = '時間不明';
  }
  return `${days} ${time}`;
}
function formatHours(shop){
  return shop.hours.map(formatEntry).join('<br>');
}
function formatClosed(shop){
  const base = shop.closedDays && shop.closedDays.length ? `定休日: ${formatDays(shop.closedDays)}` : '基本無休';
  return shop.closedNote ? `${base} ・ ${shop.closedNote}` : base;
}

function nowInTokyo(){
  const now = new Date();
  const fmt = new Intl.DateTimeFormat('en-US', {
    timeZone: 'Asia/Tokyo', hour12: false, weekday: 'short',
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    year: 'numeric', month: '2-digit', day: '2-digit'
  });
  const map = {};
  fmt.formatToParts(now).forEach(p => map[p.type] = p.value);
  const dow = map.weekday.slice(0,3).toLowerCase();
  const hour = parseInt(map.hour, 10);
  const minute = parseInt(map.minute, 10);
  return {
    dow, minutes: hour*60+minute,
    clockStr: `${map.hour}:${map.minute}:${map.second}`,
    dateStr: `${map.year}/${map.month}/${map.day}(${'日月火水木金土'[DOW_ORDER.indexOf(dow)]}) JST`
  };
}

function evaluateShop(shop, ctx){
  let matchedOpen = false;
  let matchedUnknown = false;

  for(const h of shop.hours){
    if(!h.days.includes(ctx.dow)) continue;
    const openM = timeToMinutes(h.open);
    const closeM = timeToMinutes(h.close);
    if(openM == null && closeM == null){ matchedUnknown = true; continue; }
    if(openM != null && closeM == null){
      if(ctx.minutes >= openM) matchedUnknown = true;
      continue;
    }
    if(openM == null && closeM != null){
      if(ctx.minutes < closeM) matchedUnknown = true;
      continue;
    }
    if(h.closesNextDay){
      if(ctx.minutes >= openM) matchedOpen = true;
    } else if(ctx.minutes >= openM && ctx.minutes < closeM){
      matchedOpen = true;
    }
  }

  const yDow = prevDow(ctx.dow);
  for(const h of shop.hours){
    if(h.closesNextDay && h.days.includes(yDow)){
      const closeM = timeToMinutes(h.close);
      if(closeM != null && ctx.minutes < closeM) matchedOpen = true;
    }
  }

  if(matchedOpen) return 'open';
  if(matchedUnknown) return 'unknown';
  return 'closed';
}

function handlePhotoError(img){
  const box = img.closest('.card-photo');
  if(box) box.innerHTML = '<div class="photo-placeholder">🍜</div>';
}

function renderCard(shop){
  const li = document.createElement('li');
  li.className = 'shop-card';
  li.dataset.name = shop.name;
  li.dataset.area = shop.area || '';
  const igHandle = shop.instagram ? shop.instagram.replace(/^@/, '') : null;
  const photoInner = shop.photo
    ? `<img src="${shop.photo}" alt="${shop.name}のラーメン" loading="lazy" referrerpolicy="no-referrer" onerror="handlePhotoError(this)">`
    : `<div class="photo-placeholder">🍜</div>`;
  li.innerHTML = `
    <div class="shop-card-inner">
      <div class="card-content">
        <div class="card-top">
          <span class="dot"></span>
          <h3 class="shop-name">${shop.name}</h3>
        </div>
        <p class="shop-area">${shop.area || ''}</p>
        <p class="shop-hours">${formatHours(shop)}</p>
        <p class="shop-closed">${formatClosed(shop)}</p>
        <div class="card-links">
          <button type="button" class="map-toggle" data-query="${encodeURIComponent('ラーメン二郎 ' + shop.name + ' ' + (shop.area || '').split('/')[0])}">📍 地図を見る</button>
          ${shop.twitter ? `<a class="sns-toggle" href="https://x.com/${shop.twitter}" target="_blank" rel="noopener">𝕏 最新投稿を見る</a>` : ''}
          ${(!shop.twitter && igHandle) ? `<a class="sns-link" href="https://www.instagram.com/${igHandle}/" target="_blank" rel="noopener">Instagramで確認</a>` : ''}
          ${(!shop.twitter && !igHandle) ? `<span class="sns-none">公式SNS未確認</span>` : ''}
        </div>
        <div class="map-embed" hidden></div>
      </div>
      <div class="card-photo">${photoInner}</div>
    </div>
  `;
  return li;
}

function renderAll(){
  const ctx = nowInTokyo();
  updateClock(ctx);

  const query = document.getElementById('search').value.trim().toLowerCase();

  const listOpen = document.getElementById('list-open');
  const listClosed = document.getElementById('list-closed');
  const listUnknown = document.getElementById('list-unknown');
  listOpen.innerHTML = '';
  listClosed.innerHTML = '';
  listUnknown.innerHTML = '';

  let openCount = 0, closedCount = 0, unknownCount = 0;

  for(const shop of SHOPS){
    if(query){
      const hay = (shop.name + ' ' + (shop.area||'') + ' ' + (regionOf(shop.area)||'')).toLowerCase();
      if(!hay.includes(query)) continue;
    }
    const status = evaluateShop(shop, ctx);
    const card = renderCard(shop);
    if(status === 'open'){ listOpen.appendChild(card); openCount++; }
    else if(status === 'unknown'){ listUnknown.appendChild(card); unknownCount++; }
    else { listClosed.appendChild(card); closedCount++; }
  }

  document.getElementById('count-open').textContent = openCount;
  document.getElementById('count-closed').textContent = closedCount;

  if(openCount === 0){
    listOpen.innerHTML = '<li class="empty-note">該当する営業中の店舗はありません</li>';
  }
  if(closedCount === 0){
    listClosed.innerHTML = '<li class="empty-note">該当する非営業の店舗はありません</li>';
  }

  const unknownSection = document.getElementById('unknown-section');
  unknownSection.hidden = unknownCount === 0;

  document.getElementById('summary').textContent = `全${SHOPS.length}店舗中 営業中 ${openCount} / 非営業 ${closedCount}${unknownCount ? ` / 不明 ${unknownCount}` : ''}`;
}

function updateClock(ctx){
  document.getElementById('clock').textContent = ctx.clockStr;
  document.getElementById('clock-date').textContent = ctx.dateStr;
}

document.addEventListener('click', (e) => {
  const mapBtn = e.target.closest('.map-toggle');
  if(!mapBtn) return;
  const card = mapBtn.closest('.shop-card');
  const embed = card.querySelector('.map-embed');
  if(!embed) return;
  const wasHidden = embed.hidden;
  embed.hidden = !wasHidden;
  if(wasHidden){
    if(!embed.dataset.loaded){
      embed.dataset.loaded = '1';
      embed.innerHTML = `<iframe src="https://www.google.com/maps?q=${mapBtn.dataset.query}&output=embed" loading="lazy" referrerpolicy="no-referrer-when-downgrade" allowfullscreen></iframe>`;
    }
    mapBtn.textContent = '📍 地図を閉じる';
  } else {
    mapBtn.textContent = '📍 地図を見る';
  }
});

document.getElementById('tabs').addEventListener('click', (e) => {
  const btn = e.target.closest('.tab-btn');
  if(!btn) return;
  setActiveTab(btn.dataset.tab);
});
function setActiveTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelector('[data-panel="open"]').classList.toggle('tab-visible', tab === 'open');
  document.querySelector('[data-panel="closed"]').classList.toggle('tab-visible', tab === 'closed');
}

document.getElementById('search').addEventListener('input', renderAll);
setActiveTab('open');
renderAll();
setInterval(() => updateClock(nowInTokyo()), 1000);
setInterval(renderAll, 60000);

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
